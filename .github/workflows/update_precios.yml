name: Actualizar precios gasolineras

on:
  schedule:
   - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repo
        uses: actions/checkout@v4

      - name: Preparar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install requests urllib3

      - name: Actualizar precios
        run: python update_precios.py

      - name: Guardar cambios
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add precios_gasolineras.json
          git diff --cached --quiet || git commit -m "Actualizar precios gasolineras"
          git push
