<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Generador de Hilo - Gasolina.eus</title>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 20px auto; padding: 20px; background: #f4f7f6; }
        textarea { width: 100%; height: 400px; display: block; margin: 15px 0; border: 1px solid #ccc; padding: 10px; border-radius: 5px; }
        .botones { display: flex; gap: 10px; }
        button { padding: 15px; cursor: pointer; flex: 1; font-weight: bold; border-radius: 5px; border: none; }
    </style>
</head>
<body>

    <h1>Generador de Hilo Twitter</h1>
    <div id="contenedor-gasolineras">
        <textarea id="texto-hilo" readonly>Cargando datos...</textarea>
        <div class="botones">
            <button onclick="copiar()">Copiar al portapapeles</button>
            <button onclick="twittear()" style="background:#1da1f2; color:white;">Publicar en Twitter</button>
        </div>
    </div>

    <script>
        function toBold(text) {
            const map = {'0':'ЁЭЯО','1':'ЁЭЯП','2':'ЁЭЯР','3':'ЁЭЯС','4':'ЁЭЯТ','5':'ЁЭЯУ','6':'ЁЭЯФ','7':'ЁЭЯХ','8':'ЁЭЯЦ','9':'ЁЭЯЧ','a':'ЁЭРЪ','b':'ЁЭРЫ','c':'ЁЭРЬ','d':'ЁЭРЭ','e':'ЁЭРЮ','f':'ЁЭРЯ','g':'ЁЭРа','h':'ЁЭРб','i':'ЁЭРв','j':'ЁЭРг','k':'ЁЭРд','l':'ЁЭРе','m':'ЁЭРж','n':'ЁЭРз','o':'ЁЭРи','p':'ЁЭРй','q':'ЁЭРк','r':'ЁЭРл','s':'ЁЭРм','t':'ЁЭРн','u':'ЁЭРо','v':'ЁЭРп','w':'ЁЭР░','x':'ЁЭР▒','y':'ЁЭР▓','z':'ЁЭР│','A':'ЁЭРА','B':'ЁЭРБ','C':'ЁЭРВ','D':'ЁЭРГ','E':'ЁЭРД','F':'ЁЭРЕ','G':'ЁЭРЖ','H':'ЁЭРЗ','I':'ЁЭРИ','J':'ЁЭРЙ','K':'ЁЭРК','L':'ЁЭРЛ','M':'ЁЭРМ','N':'ЁЭРН','O':'ЁЭРО','P':'ЁЭРП','Q':'ЁЭРР','R':'ЁЭРС','S':'ЁЭРТ','T':'ЁЭРУ','U':'ЁЭРФ','V':'ЁЭРХ','W':'ЁЭРЦ','X':'ЁЭРЧ','Y':'ЁЭРШ','Z':'ЁЭРЩ',' ':' ','├й':'├й','├н':'├н',':':':','тВм':'тВм'};
            return text.split('').map(char => map[char] || char).join('');
        }

        async function init() {
            try {
                const res = await fetch(`./precios_gasolineras.json?t=${Date.now()}`);
                const data = await res.json();
                const prods = ["GIPUZKOA", "├БLAVA", "NAVARRA", "BIZKAIA"];
                const fecha = "08/06/2026";
                
                let hilo = `ЁЯз╡ HILO: GASOLINERAS M├БS BARATAS DE EUSKADI Y NAVARRA (${fecha})\n┬┐Quieres dejar de pagar de m├бs al repostar? Si buscas la gasolinera m├бs barata cerca de ti, accede a https://gasolina.eus. ЁЯСЗ #AhorroCombustible #Euskadi #Navarra\n\n`;

                prods.forEach(p => {
                    const ests = data.datos.filter(e => e.Provincia.toUpperCase().includes(p) || (p === "├БLAVA" && e.Provincia.toUpperCase().includes("ARABA")));
                    const g95 = ests.filter(e => e["Precio Gasolina 95 E5"]).sort((a,b) => parseFloat(a["Precio Gasolina 95 E5"].replace(',','.')) - parseFloat(b["Precio Gasolina 95 E5"].replace(',','.')))[0];
                    const gA = ests.filter(e => e["Precio Gasoleo A"]).sort((a,b) => parseFloat(a["Precio Gasoleo A"].replace(',','.')) - parseFloat(b["Precio Gasoleo A"].replace(',','.')))[0];
                    
                    hilo += `ЁЯУН ${p} (${fecha}):\n`;
                    if(g95) hilo += `${toBold("Gasolina 95: " + g95["Precio Gasolina 95 E5"] + "тВм")}\n${g95.R├│tulo} (${g95.Localidad})\nhttps://www.google.com/maps/search/?api=1&query=${g95.Latitud.replace(',','.')},${g95["Longitud (WGS84)"].replace(',','.')}\n\n`;
                    if(gA) hilo += `${toBold("Diesel: " + gA["Precio Gasoleo A"] + "тВм")}\n${gA.R├│tulo} (${gA.Localidad})\nhttps://www.google.com/maps/search/?api=1&query=${gA.Latitud.replace(',','.')},${gA["Longitud (WGS84)"].replace(',','.')}\n\n`;
                });
                document.getElementById("texto-hilo").value = hilo;
            } catch(e) { document.getElementById("texto-hilo").value = "Error al cargar JSON."; }
        }

        function copiar() {
            document.getElementById("texto-hilo").select();
            document.execCommand("copy");
            alert("┬бCopiado al portapapeles!");
        }

        function twittear() {
            const t = document.getElementById("texto-hilo").value;
            window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(t)}`, '_blank');
        }

        init();
    </script>
</body>
</html>
