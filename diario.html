<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Hilo - Gasolina.eus</title>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 20px auto; padding: 20px; background: #f4f7f6; }
        h1 { color: #007bff; text-align: center; }
        #contenedor-gasolineras { background: #fff; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        textarea { width: 100%; height: 500px; margin-top: 15px; font-family: monospace; padding: 10px; border: 1px solid #ccc; border-radius: 5px; }
        button { background: #007bff; color: white; border: none; padding: 15px 20px; border-radius: 5px; cursor: pointer; font-size: 16px; width: 100%; }
        button:hover { background: #0056b3; }
    </style>
</head>
<body>

    <h1>Generador de Hilo Twitter</h1>
    <main id="contenedor-gasolineras">
        <p>Procesando datos del JSON...</p>
    </main>

    <script>
        async function generarTodo() {
            try {
                const res = await fetch(`./precios_gasolineras.json?t=${Date.now()}`);
                const data = await res.json();
                const prods = ["GIPUZKOA", "ÁLAVA", "NAVARRA", "BIZKAIA"];
                const fecha = "08/06/2026"; // Fecha fija según tu ejemplo
                
                let hilo = `🧵 HILO: GASOLINERAS MÁS BARATAS DE EUSKADI Y NAVARRA (${fecha})\n¿Quieres dejar de pagar de más al repostar? Si buscas la gasolinera más barata cerca de ti, accede a https://gasolina.eus. 👇 #AhorroCombustible #Euskadi #Navarra\n\n`;

                prods.forEach(p => {
                    // Filtrar por provincia
                    const ests = data.datos.filter(e => e.Provincia.toUpperCase().includes(p) || (p === "ÁLAVA" && e.Provincia.toUpperCase().includes("ARABA")));
                    
                    // Buscar más baratas
                    const g95 = ests.filter(e => e["Precio Gasolina 95 E5"]).sort((a,b) => parseFloat(a["Precio Gasolina 95 E5"].replace(',','.')) - parseFloat(b["Precio Gasolina 95 E5"].replace(',','.')))[0];
                    const gA = ests.filter(e => e["Precio Gasoleo A"]).sort((a,b) => parseFloat(a["Precio Gasoleo A"].replace(',','.')) - parseFloat(b["Precio Gasoleo A"].replace(',','.')))[0];

                    const genUrl = (e) => `http://googleusercontent.com/maps.google.com/${e.Latitud.replace(',','.')},${e["Longitud (WGS84)"].replace(',','.')}`;

                    hilo += `📍 ${p} (${fecha}):\n`;
                    if(g95) hilo += `1️⃣ ${g95.Rótulo} (${g95.Localidad}, ${g95.Dirección}): G95 ${g95["Precio Gasolina 95 E5"]}€ ${genUrl(g95)}\n`;
                    if(gA) hilo += `2️⃣ ${gA.Rótulo} (${gA.Localidad}, ${gA.Dirección}): Diésel ${gA["Precio Gasoleo A"]}€ ${genUrl(gA)}\n\n`;
                });

                const contenedor = document.getElementById('contenedor-gasolineras');
                contenedor.innerHTML = `
                    <button onclick="copiarTexto()">Copiar Hilo para Twitter</button>
                    <textarea id="texto-hilo" readonly>${hilo}</textarea>
                `;
            } catch (e) {
                document.getElementById('contenedor-gasolineras').innerHTML = "Error al procesar el JSON.";
            }
        }

        function copiarTexto() {
            const copyText = document.getElementById("texto-hilo");
            copyText.select();
            document.execCommand("copy");
            alert("¡Hilo copiado al portapapeles!");
        }

        generarTodo();
    </script>
</body>
</html>
