<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Hilo - Gasolina.eus</title>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 20px auto; padding: 20px; background: #f4f7f6; }
        h1 { color: #007bff; text-align: center; }
        #contenedor-gasolineras { background: #fff; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        textarea { width: 100%; height: 500px; margin-top: 15px; font-family: sans-serif; padding: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { background: #007bff; color: white; border: none; padding: 15px 20px; border-radius: 5px; cursor: pointer; font-size: 16px; width: 100%; font-weight: bold; }
    </style>
</head>
<body>

    <h1>Generador de Hilo Twitter</h1>
    <main id="contenedor-gasolineras">Procesando datos...</main>

    <script>
        // Funci├│n para convertir texto normal a Unicode negrita
        function toBold(text) {
            const boldMap = {
                'a':'ЁЭРЪ','b':'ЁЭРЫ','c':'ЁЭРЬ','d':'ЁЭРЭ','e':'ЁЭРЮ','f':'ЁЭРЯ','g':'ЁЭРа','h':'ЁЭРб','i':'ЁЭРв','j':'ЁЭРг','k':'ЁЭРд','l':'ЁЭРе','m':'ЁЭРж','n':'ЁЭРз','o':'ЁЭРи','p':'ЁЭРй','q':'ЁЭРк','r':'ЁЭРл','s':'ЁЭРм','t':'ЁЭРн','u':'ЁЭРо','v':'ЁЭРп','w':'ЁЭР░','x':'ЁЭР▒','y':'ЁЭР▓','z':'ЁЭР│',
                'A':'ЁЭРА','B':'ЁЭРБ','C':'ЁЭРВ','D':'ЁЭРГ','E':'ЁЭРД','F':'ЁЭРЕ','G':'ЁЭРЖ','H':'ЁЭРЗ','I':'ЁЭРИ','J':'ЁЭРЙ','K':'ЁЭРК','L':'ЁЭРЛ','M':'ЁЭРМ','N':'ЁЭРН','O':'ЁЭРО','P':'ЁЭРП','Q':'ЁЭРР','R':'ЁЭРС','S':'ЁЭРТ','T':'ЁЭРУ','U':'ЁЭРФ','V':'ЁЭРХ','W':'ЁЭРЦ','X':'ЁЭРЧ','Y':'ЁЭРШ','Z':'ЁЭРЩ',
                '0':'ЁЭЯО','1':'ЁЭЯП','2':'ЁЭЯР','3':'ЁЭЯС','4':'ЁЭЯТ','5':'ЁЭЯУ','6':'ЁЭЯФ','7':'ЁЭЯХ','8':'ЁЭЯЦ','9':'ЁЭЯЧ',
                ':':':', ' ': ' '
            };
            return text.split('').map(char => boldMap[char] || char).join('');
        }

        async function generarTodo() {
            try {
                const res = await fetch(`./precios_gasolineras.json?t=${Date.now()}`);
                const data = await res.json();
                const prods = ["GIPUZKOA", "├БLAVA", "NAVARRA", "BIZKAIA"];
                const fecha = "08/06/2026";
                
                let hilo = `ЁЯз╡ HILO: GASOLINERAS M├БS BARATAS DE EUSKADI Y NAVARRA (${fecha})\n┬┐Quieres dejar de pagar de m├бs al repostar? Si buscas la gasolinera m├бs barata cerca de ti, accede a https://gasolina.eus. ЁЯСЗ #AhorroCombustible #Euskadi #Navarra\n\n`;

                prods.forEach(p => {
                    const ests = data.datos.filter(e => e.Provincia.toUpperCase().includes(p) || (p === "├БLAVA" && e.Provincia.toUpperCase().includes("ARABA")));
                    
                    const g95 = ests.filter(e => e["Precio Gasolina 95 E5"]).sort((a,b) => parseFloat(a["Precio Gasolina 95 E5"].replace(',','.')) - parseFloat(b["Precio Gasolina 95 E5"].replace(',','.')))[0];
                    const gA = ests.filter(e => e["Precio Gasoleo A"]).sort((a,b) => parseFloat(a["Precio Gasoleo A"].replace(',','.')) - parseFloat(b["Precio Gasoleo A"].replace(',','.')))[0];

                    const genUrl = (e) => `https://www.google.com/maps/search/?api=1&query=${e.Latitud.replace(',','.')},${e["Longitud (WGS84)"].replace(',','.')}`;

                    hilo += `ЁЯУН ${p} (${fecha}):\n`;
                    if(g95) hilo += `${toBold("Gasolina 95: " + g95["Precio Gasolina 95 E5"] + "тВм")}\n${g95.R├│tulo} (${g95.Localidad}, ${g95.Direcci├│n})\n${genUrl(g95)}\n\n`;
                    if(gA) hilo += `${toBold("Diesel: " + gA["Precio Gasoleo A"] + "тВм")}\n${gA.R├│lulo || gA.R├│tulo} (${gA.Localidad}, ${gA.Direcci├│n})\n${genUrl(gA)}\n\n`;
                });

                document.getElementById('contenedor-gasolineras').innerHTML = `
                    <button onclick="copiarTexto()">Copiar texto para Twitter</button>
                    <textarea id="texto-hilo" readonly>${hilo}</textarea>
                `;
            } catch (e) {
                document.getElementById('contenedor-gasolineras').innerHTML = "Error al procesar el JSON.";
            }
        }

        function copiarTexto() {
            const copyText = document.getElementById("texto-hilo");
            copyText.select();
            document.execCommand("copy");
            alert("┬бHilo copiado!");
        }

        generarTodo();
    </script>
</body>
</html>
