<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Generador de Hilo - Gasolina.eus</title>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 20px auto; padding: 20px; background: #f4f7f6; }
        textarea { width: 100%; height: 400px; display: block; margin: 15px 0; border: 1px solid #ccc; padding: 10px; border-radius: 5px; }
        .botones { display: flex; gap: 10px; }
        button { padding: 15px; cursor: pointer; flex: 1; font-weight: bold; border-radius: 5px; border: none; }
    </style>
</head>
<body>

    <h1>Generador de Hilo Twitter</h1>
    <div id="contenedor-gasolineras">
        <textarea id="texto-hilo" readonly>Cargando datos...</textarea>
        <div class="botones">
            <button onclick="copiar()">Copiar al portapapeles</button>
            <button onclick="twittear()" style="background:#1da1f2; color:white;">Publicar en Twitter</button>
        </div>
    </div>

    <script>
        function toBold(text) {
            const map = {'0':'рқҹҺ','1':'рқҹҸ','2':'рқҹҗ','3':'рқҹ‘','4':'рқҹ’','5':'рқҹ“','6':'рқҹ”','7':'рқҹ•','8':'рқҹ–','9':'рқҹ—','a':'рқҗҡ','b':'рқҗӣ','c':'рқҗң','d':'рқҗқ','e':'рқҗһ','f':'рқҗҹ','g':'рқҗ ','h':'рқҗЎ','i':'рқҗў','j':'рқҗЈ','k':'рқҗӨ','l':'рқҗҘ','m':'рқҗҰ','n':'рқҗ§','o':'рқҗЁ','p':'рқҗ©','q':'рқҗӘ','r':'рқҗ«','s':'рқҗ¬','t':'рқҗӯ','u':'рқҗ®','v':'рқҗҜ','w':'рқҗ°','x':'рқҗұ','y':'рқҗІ','z':'рқҗі','A':'рқҗҖ','B':'рқҗҒ','C':'рқҗӮ','D':'рқҗғ','E':'рқҗ„','F':'рқҗ…','G':'рқҗҶ','H':'рқҗҮ','I':'рқҗҲ','J':'рқҗү','K':'рқҗҠ','L':'рқҗӢ','M':'рқҗҢ','N':'рқҗҚ','O':'рқҗҺ','P':'рқҗҸ','Q':'рқҗҗ','R':'рқҗ‘','S':'рқҗ’','T':'рқҗ“','U':'рқҗ”','V':'рқҗ•','W':'рқҗ–','X':'рқҗ—','Y':'рқҗҳ','Z':'рқҗҷ',' ':' ','Г©':'Г©','Гӯ':'Гӯ',':':':','вӮ¬':'вӮ¬'};
            return text.split('').map(char => map[char] || char).join('');
        }

        async function init() {
            try {
                const res = await fetch(`./precios_gasolineras.json?t=${Date.now()}`);
                const data = await res.json();
                const prods = ["GIPUZKOA", "ГҒLAVA", "NAVARRA", "BIZKAIA"];
                let hilo = `рҹ§ө HILO: GASOLINERAS MГҒS BARATAS (08/06/2026)\n\n`;

                prods.forEach(p => {
                    const ests = data.datos.filter(e => e.Provincia.toUpperCase().includes(p) || (p === "ГҒLAVA" && e.Provincia.toUpperCase().includes("ARABA")));
                    const g95 = ests.filter(e => e["Precio Gasolina 95 E5"]).sort((a,b) => parseFloat(a["Precio Gasolina 95 E5"].replace(',','.')) - parseFloat(b["Precio Gasolina 95 E5"].replace(',','.')))[0];
                    const gA = ests.filter(e => e["Precio Gasoleo A"]).sort((a,b) => parseFloat(a["Precio Gasoleo A"].replace(',','.')) - parseFloat(b["Precio Gasoleo A"].replace(',','.')))[0];
                    
                    hilo += `рҹ“Қ ${p}:\n`;
                    if(g95) hilo += `${toBold("Gasolina 95: " + g95["Precio Gasolina 95 E5"] + "вӮ¬")}\n${g95.RГіtulo} (${g95.Localidad})\nhttps://www.google.com/maps/search/?api=1&query=${g95.Latitud.replace(',','.')},${g95["Longitud (WGS84)"].replace(',','.')}\n\n`;
                    if(gA) hilo += `${toBold("Diesel: " + gA["Precio Gasoleo A"] + "вӮ¬")}\n${gA.RГіtulo} (${gA.Localidad})\nhttps://www.google.com/maps/search/?api=1&query=${gA.Latitud.replace(',','.')},${gA["Longitud (WGS84)"].replace(',','.')}\n\n`;
                });
                document.getElementById("texto-hilo").value = hilo;
            } catch(e) { document.getElementById("texto-hilo").value = "Error al cargar JSON."; }
        }

        function copiar() {
            document.getElementById("texto-hilo").select();
            document.execCommand("copy");
            alert("ВЎCopiado al portapapeles!");
        }

        function twittear() {
            const t = document.getElementById("texto-hilo").value;
            window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(t)}`, '_blank');
        }

        init();
    </script>
</body>
</html>
