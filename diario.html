<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Generador de Posts - Gasolina.eus</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 50px auto; padding: 20px; text-align: center; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 30px; }
        button { padding: 20px; font-size: 16px; cursor: pointer; border: none; border-radius: 8px; background: #1da1f2; color: white; font-weight: bold; }
        button:hover { background: #0c85d0; }
    </style>
</head>
<body>

    <h1>Publicar en Twitter</h1>
    <div id="contenedor" class="grid">Cargando...</div>

    <script>
        function toBold(t) {
            const m = {'a':'ЁЭРЪ','b':'ЁЭРЫ','c':'ЁЭРЬ','d':'ЁЭРЭ','e':'ЁЭРЮ','f':'ЁЭРЯ','g':'ЁЭРа','h':'ЁЭРб','i':'ЁЭРв','j':'ЁЭРг','k':'ЁЭРд','l':'ЁЭРе','m':'ЁЭРж','n':'ЁЭРз','o':'ЁЭРи','p':'ЁЭРй','q':'ЁЭРк','r':'ЁЭРл','s':'ЁЭРм','t':'ЁЭРн','u':'ЁЭРо','v':'ЁЭРп','w':'ЁЭР░','x':'ЁЭР▒','y':'ЁЭР▓','z':'ЁЭР│','A':'ЁЭРА','B':'ЁЭРБ','C':'ЁЭРВ','D':'ЁЭРГ','E':'ЁЭРД','F':'ЁЭРЕ','G':'ЁЭРЖ','H':'ЁЭРЗ','I':'ЁЭРИ','J':'ЁЭРЙ','K':'ЁЭРК','L':'ЁЭРЛ','M':'ЁЭРМ','N':'ЁЭРН','O':'ЁЭРО','P':'ЁЭРП','Q':'ЁЭРР','R':'ЁЭРС','S':'ЁЭРТ','T':'ЁЭРУ','U':'ЁЭРФ','V':'ЁЭРХ','W':'ЁЭРЦ','X':'ЁЭРЧ','Y':'ЁЭРШ','Z':'ЁЭРЩ','0':'ЁЭЯО','1':'ЁЭЯП','2':'ЁЭЯР','3':'ЁЭЯС','4':'ЁЭЯТ','5':'ЁЭЯУ','6':'ЁЭЯФ','7':'ЁЭЯХ','8':'ЁЭЯЦ','9':'ЁЭЯЧ',' ':' ','├й':'├й','├н':'├н',':':':','тВм':'тВм','(':'(',')':')','-':'-','&':'&','/':'/','.':'.'};
            return t.split('').map(c => m[c] || c).join('');
        }

        async function init() {
            try {
                const res = await fetch(`./precios_gasolineras.json?t=${Date.now()}`);
                const data = await res.json();
                const prods = ["GIPUZKOA", "├БLAVA", "NAVARRA", "BIZKAIA"];
                const fecha = "08/06/2026";
                let posts = [];

                prods.forEach(p => {
                    const ests = data.datos.filter(e => e.Provincia.toUpperCase().includes(p) || (p === "├БLAVA" && e.Provincia.toUpperCase().includes("ARABA")));
                    const g95 = ests.filter(e => e["Precio Gasolina 95 E5"]).sort((a,b) => parseFloat(a["Precio Gasolina 95 E5"].replace(',','.')) - parseFloat(b["Precio Gasolina 95 E5"].replace(',','.')))[0];
                    const gA = ests.filter(e => e["Precio Gasoleo A"]).sort((a,b) => parseFloat(a["Precio Gasoleo A"].replace(',','.')) - parseFloat(b["Precio Gasoleo A"].replace(',','.')))[0];
                    
                    const getUrl = (e) => {
                        const lat = e.Latitud.replace(',', '.');
                        const lon = e["Longitud (WGS84)"].replace(',', '.');
                        return `https://www.google.com/maps/search/?api=1&query=${lat},${lon}`;
                    };
                    
                    // Castellano
                    let es = `${toBold("Gasolineras mas baratas " + p + " (" + fecha + ")")}\n`;
                    if(g95) es += `${g95.R├│tulo} (${g95.Localidad}) - ${toBold("Gasolina 95: " + g95["Precio Gasolina 95 E5"] + "тВм")} - ${getUrl(g95)}\n`;
                    if(gA) es += `${gA.R├│tulo} (${gA.Localidad}) - ${toBold("Diesel: " + gA["Precio Gasoleo A"] + "тВм")} - ${getUrl(gA)}`;
                    posts.push({ lang: "ES", text: es });

                    // Euskera
                    let eu = `${toBold("Gasolindegi merkeenak " + p + " (" + fecha + ")")}\n`;
                    if(g95) eu += `${g95.R├│tulo} (${g95.Localidad}) - ${toBold("95 Gasolina: " + g95["Precio Gasolina 95 E5"] + "тВм")} - ${getUrl(g95)}\n`;
                    if(gA) eu += `${gA.R├│tulo} (${gA.Localidad}) - ${toBold("Diesel: " + gA["Precio Gasoleo A"] + "тВм")} - ${getUrl(gA)}`;
                    posts.push({ lang: "EU", text: eu });
                });

                let html = "";
                posts.forEach((post, i) => {
                    const text = encodeURIComponent(post.text);
                    html += `<button onclick="window.open('https://twitter.com/intent/tweet?text=${text}', '_blank')">Post ${i+1} (${post.lang})</button>`;
                });
                document.getElementById("contenedor").innerHTML = html;
            } catch(e) { document.getElementById("contenedor").innerHTML = "Error cargando datos."; }
        }

        init();
    </script>
</body>
</html>
