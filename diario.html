<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Generador de Hilo - Gasolina.eus</title>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 20px auto; padding: 20px; background: #f4f7f6; }
        textarea { width: 100%; height: 250px; display: block; margin: 10px 0; border: 1px solid #ccc; padding: 10px; border-radius: 5px; }
        .botones { display: flex; gap: 10px; margin-bottom: 20px; }
        button { padding: 12px; cursor: pointer; flex: 1; font-weight: bold; border-radius: 5px; border: none; }
    </style>
</head>
<body>

    <h1>Generador de Hilo Twitter</h1>
    <div id="contenedor-hilos">
        <h3>Versión Castellano</h3>
        <textarea id="hilo-es" readonly></textarea>
        <div class="botones">
            <button onclick="copiar('hilo-es')">Copiar ES</button>
            <button onclick="twittear('hilo-es')" style="background:#1da1f2; color:white;">Publicar ES</button>
        </div>

        <h3>Euskarazko bertsioa</h3>
        <textarea id="hilo-eu" readonly></textarea>
        <div class="botones">
            <button onclick="copiar('hilo-eu')">Kopiatu EU</button>
            <button onclick="twittear('hilo-eu')" style="background:#1da1f2; color:white;">Argitaratu EU</button>
        </div>
    </div>

    <script>
        function toBold(text) {
            const map = {'0':'𝟎','1':'𝟏','2':'𝟐','3':'𝟑','4':'𝟒','5':'𝟓','6':'𝟔','7':'𝟕','8':'𝟖','9':'𝟗','a':'𝐚','b':'𝐛','c':'𝐜','d':'𝐝','e':'𝐞','f':'𝐟','g':'𝐠','h':'𝐡','i':'𝐢','j':'𝐣','k':'𝐤','l':'𝐥','m':'𝐦','n':'𝐧','o':'𝐨','p':'𝐩','q':'𝐪','r':'𝐫','s':'𝐬','t':'𝐭','u':'𝐮','v':'𝐯','w':'𝐰','x':'𝐱','y':'𝐲','z':'𝐳','A':'𝐀','B':'𝐁','C':'𝐂','D':'𝐃','E':'𝐄','F':'𝐅','G':'𝐆','H':'𝐇','I':'𝐈','J':'𝐉','K':'𝐊','L':'𝐋','M':'𝐌','N':'𝐍','O':'𝐎','P':'𝐏','Q':'𝐐','R':'𝐑','S':'𝐒','T':'𝐓','U':'𝐔','V':'𝐕','W':'𝐖','X':'𝐗','Y':'𝐘','Z':'𝐙',' ':' ','é':'é','í':'í',':':':','€':'€','🧵':'🧵','(':'(',')':')','-':'-','&':'&','/':'/','.':'.','👇':'👇','!':'!','?':'?'};
            return text.split('').map(char => map[char] || char).join('');
        }

        async function init() {
            try {
                const res = await fetch(`./precios_gasolineras.json?t=${Date.now()}`);
                const data = await res.json();
                const prods = ["GIPUZKOA", "ÁLAVA", "NAVARRA", "BIZKAIA"];
                const fecha = "08/06/2026";
                
                let hiloEs = `${toBold("🧵 HILO: GASOLINERAS MÁS BARATAS DE EUSKADI Y NAVARRA (" + fecha + ")")}\n¿Quieres dejar de pagar de más al repostar? Si buscas la gasolinera más barata cerca de ti, accede a https://gasolina.eus. 👇 #AhorroCombustible #Euskadi #Navarra\n\n`;
                let hiloEu = `${toBold("🧵 HARIA: EUSKADI ETA NAFARROAKO GASOLINDEGI MERKEENAK (" + fecha + ")")}\nGehiago ordaintzeari utzi nahi diozu? Zure inguruko gasolindegi merkeenaren bila bazabiltza, sartu https://gasolina.eus atarian. 👇 #ErregaiAurrezpena #Euskadi #Nafarroa\n\n`;

                prods.forEach(p => {
                    const ests = data.datos.filter(e => e.Provincia.toUpperCase().includes(p) || (p === "ÁLAVA" && e.Provincia.toUpperCase().includes("ARABA")));
                    const g95 = ests.filter(e => e["Precio Gasolina 95 E5"]).sort((a,b) => parseFloat(a["Precio Gasolina 95 E5"].replace(',','.')) - parseFloat(b["Precio Gasolina 95 E5"].replace(',','.')))[0];
                    const gA = ests.filter(e => e["Precio Gasoleo A"]).sort((a,b) => parseFloat(a["Precio Gasoleo A"].replace(',','.')) - parseFloat(b["Precio Gasoleo A"].replace(',','.')))[0];
                    
                    const url = (e) => `https://www.google.com/search?q=http://maps.google.com/%3Fq%3D43.167222,-2.632222{e.Latitud.replace(',','.')},${e["Longitud (WGS84)"].replace(',','.')}`;

                    hiloEs += `📍 ${p} (${fecha}):\n`;
                    hiloEu += `📍 ${p} (${fecha}):\n`;
                    
                    if(g95) {
                        hiloEs += `${g95.Rótulo} (${g95.Localidad})\n${toBold("Gasolina 95: " + g95["Precio Gasolina 95 E5"] + "€")}\n${url(g95)}\n\n`;
                        hiloEu += `${g95.Rótulo} (${g95.Localidad})\n${toBold("95 Gasolina: " + g95["Precio Gasolina 95 E5"] + "€")}\n${url(g95)}\n\n`;
                    }
                    if(gA) {
                        hiloEs += `${gA.Rótulo} (${gA.Localidad})\n${toBold("Diesel: " + gA["Precio Gasoleo A"] + "€")}\n${url(gA)}\n\n`;
                        hiloEu += `${gA.Rótulo} (${gA.Localidad})\n${toBold("Diesel: " + gA["Precio Gasoleo A"] + "€")}\n${url(gA)}\n\n`;
                    }
                });
                document.getElementById("hilo-es").value = hiloEs;
                document.getElementById("hilo-eu").value = hiloEu;
            } catch(e) { 
                document.getElementById("hilo-es").value = "Error."; 
                document.getElementById("hilo-eu").value = "Error.";
            }
        }

        function copiar(id) {
            document.getElementById(id).select();
            document.execCommand("copy");
            alert("Kopiatuta!");
        }

        function twittear(id) {
            const t = document.getElementById(id).value;
            window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(t)}`, '_blank');
        }

        init();
    </script>
</body>
</html>
