<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Generador de Tweets - Gasolina.eus</title>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 20px auto; padding: 20px; background: #f4f7f6; }
        .tweet-box { margin-bottom: 30px; background: #fff; padding: 15px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        textarea { width: 100%; height: 150px; display: block; margin: 10px 0; border: 1px solid #ccc; padding: 10px; border-radius: 5px; }
        .botones { display: flex; gap: 10px; }
        button { padding: 10px; cursor: pointer; flex: 1; font-weight: bold; border-radius: 5px; border: none; }
    </style>
</head>
<body>

    <h1>Tweets por Provincia</h1>
    <div id="contenedor-tweets">Cargando datos...</div>

    <script>
        function toBold(text) {
            const map = {'0':'ЁЭЯО','1':'ЁЭЯП','2':'ЁЭЯР','3':'ЁЭЯС','4':'ЁЭЯТ','5':'ЁЭЯУ','6':'ЁЭЯФ','7':'ЁЭЯХ','8':'ЁЭЯЦ','9':'ЁЭЯЧ','a':'ЁЭРЪ','b':'ЁЭРЫ','c':'ЁЭРЬ','d':'ЁЭРЭ','e':'ЁЭРЮ','f':'ЁЭРЯ','g':'ЁЭРа','h':'ЁЭРб','i':'ЁЭРв','j':'ЁЭРг','k':'ЁЭРд','l':'ЁЭРе','m':'ЁЭРж','n':'ЁЭРз','o':'ЁЭРи','p':'ЁЭРй','q':'ЁЭРк','r':'ЁЭРл','s':'ЁЭРм','t':'ЁЭРн','u':'ЁЭРо','v':'ЁЭРп','w':'ЁЭР░','x':'ЁЭР▒','y':'ЁЭР▓','z':'ЁЭР│','A':'ЁЭРА','B':'ЁЭРБ','C':'ЁЭРВ','D':'ЁЭРГ','E':'ЁЭРД','F':'ЁЭРЕ','G':'ЁЭРЖ','H':'ЁЭРЗ','I':'ЁЭРИ','J':'ЁЭРЙ','K':'ЁЭРК','L':'ЁЭРЛ','M':'ЁЭРМ','N':'ЁЭРН','O':'ЁЭРО','P':'ЁЭРП','Q':'ЁЭРР','R':'ЁЭРС','S':'ЁЭРТ','T':'ЁЭРУ','U':'ЁЭРФ','V':'ЁЭРХ','W':'ЁЭРЦ','X':'ЁЭРЧ','Y':'ЁЭРШ','Z':'ЁЭРЩ',' ':' ','├й':'├й','├н':'├н',':':':','тВм':'тВм','(':'(',')':')','-':'-','&':'&','/':'/','.':'.','!':'!','?':'?'};
            return text.split('').map(char => map[char] || char).join('');
        }

        async function init() {
            try {
                const res = await fetch(`./precios_gasolineras.json?t=${Date.now()}`);
                const data = await res.json();
                const prods = ["GIPUZKOA", "├БLAVA", "NAVARRA", "BIZKAIA"];
                let html = "";

                prods.forEach((p, index) => {
                    const ests = data.datos.filter(e => e.Provincia.toUpperCase().includes(p) || (p === "├БLAVA" && e.Provincia.toUpperCase().includes("ARABA")));
                    const g95 = ests.filter(e => e["Precio Gasolina 95 E5"]).sort((a,b) => parseFloat(a["Precio Gasolina 95 E5"].replace(',','.')) - parseFloat(b["Precio Gasolina 95 E5"].replace(',','.')))[0];
                    const gA = ests.filter(e => e["Precio Gasoleo A"]).sort((a,b) => parseFloat(a["Precio Gasoleo A"].replace(',','.')) - parseFloat(b["Precio Gasoleo A"].replace(',','.')))[0];
                    const url = (e) => `https://www.google.com/search?q=http://maps.google.com/%3Fq%3D42.842778,-2.686667{e.Latitud.replace(',','.')},${e["Longitud (WGS84)"].replace(',','.')}`;
                    
                    // T├нtulo en negrita + Provincia
                    let titulo = toBold("Gasolineras mas baratas " + p);
                    let contenido = `${titulo}\n`;
                    
                    if(g95) contenido += `${g95.R├│tulo} (${g95.Localidad}) - ${toBold("Gasolina 95: " + g95["Precio Gasolina 95 E5"] + "тВм")} - ${url(g95)}\n`;
                    if(gA) contenido += `${gA.R├│tulo} (${gA.Localidad}) - ${toBold("Diesel: " + gA["Precio Gasoleo A"] + "тВм")} - ${url(gA)}`;
                    
                    html += `<div class="tweet-box">
                        <textarea id="tw-${index}" readonly>${contenido}</textarea>
                        <div class="botones">
                            <button onclick="copiar('tw-${index}')">Copiar</button>
                            <button onclick="twittear('tw-${index}')" style="background:#1da1f2; color:white;">Postear</button>
                        </div>
                    </div>`;
                });
                document.getElementById("contenedor-tweets").innerHTML = html;
            } catch(e) { document.getElementById("contenedor-tweets").innerHTML = "Error al cargar datos."; }
        }

        function copiar(id) {
            document.getElementById(id).select();
            document.execCommand("copy");
            alert("┬бCopiado!");
        }

        function twittear(id) {
            const t = document.getElementById(id).value;
            window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(t)}`, '_blank');
        }

        init();
    </script>
</body>
</html>
