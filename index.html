<!doctype html>
<html lang="eu">
<head>
  <meta charset="utf-8">
  <meta name="google-adsense-account" content="ca-pub-4561237649685966">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>gasolina.eus</title>

  <link rel="stylesheet" href="styles.css">

  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4561237649685966"
     crossorigin="anonymous"></script>
</head>
<body>
  <main class="app">
    <div class="language-selector">
      <button id="btn-eu" class="lang active">EU</button>
      <button id="btn-es" class="lang">ES</button>
    </div>

    <section id="pantalla-inicio" class="screen">
      <h1 class="titulo">gasolina<span>.eus</span></h1>
      <p id="subtitulo" class="subtitulo">Konparatu prezioak eta aurreztu depositua betetzean.</p>

      <button id="btn-ubicacion" class="btn-principal">
        📍 Erakutsi gasolindegiak
        <small id="btn-ubicacion-sub">Gomendagarria da kokapena onartzea bilatzeko</small>
      </button>
    </section>

    <section id="pantalla-manual" class="screen hidden">
      <h1 class="titulo">gasolina<span>.eus</span></h1>
      <p id="texto-municipio" class="texto-centro">📍 Idatzi zure udalerria:</p>

      <select id="select-municipio" class="select"></select>

      <button id="btn-confirmar" class="btn-principal compacto">
        🔍 Bilatu
      </button>
    </section>

    <section id="pantalla-resultados" class="screen hidden">
      <h1 class="titulo">gasolina<span>.eus</span></h1>

      <details class="ajustes">
        <summary id="titulo-ajustes">⚙️ Bilaketa ezarpenak</summary>

        <label id="label-cambiar-muni" for="select-municipio-ajustes">Aldatu udalerria:</label>
        <select id="select-municipio-ajustes" class="select"></select>

        <p id="label-radio" class="label">Bilaketa-erradioa:</p>
        <div class="radio-group">
          <button class="radio-btn active" data-radio="5">5 km</button>
          <button class="radio-btn" data-radio="10">10 km</button>
          <button class="radio-btn" data-radio="20">20 km</button>
        </div>

        <p id="label-combustible" class="label">Prezioaren arabera ordenatu:</p>
        <div class="radio-group">
          <button class="fuel-btn active" data-fuel="Diésel">Diésel</button>
          <button class="fuel-btn" data-fuel="G95">G95</button>
        </div>

        <button id="btn-buscar-ajustes" class="btn-principal compacto">
          🔍 Bilatu
        </button>
      </details>

      <div id="resumen-filtros" class="resumen-filtros"></div>

      <div id="resultados"></div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
