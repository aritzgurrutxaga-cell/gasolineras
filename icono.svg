<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@700&amp;display=swap');
      
      .fondo {
        fill: #ffffff;
      }
      
      .texto-icono {
        font-family: 'Poppins', sans-serif;
        font-weight: 700;
        font-size: 340px;
        letter-spacing: -8px;
      }
      
      .g {
        fill: #0f172a;
      }
      
      .punto {
        fill: #ef4444;
      }
    </style>
  </defs>
  
  <rect class="fondo" width="512" height="512" rx="115" />
  
  <text x="50%" y="60%" dominant-baseline="middle" text-anchor="middle" class="texto-icono">
    <tspan class="g">g</tspan><tspan class="punto">.</tspan>
  </text>
</svg>
